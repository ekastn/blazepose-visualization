<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blazepose Visualization</title>

    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
        }
      }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        zinc: {
                            50: '#fafafa', 100: '#f4f4f5', 200: '#e4e4e7', 300: '#d4d4d8', 400: '#a1a1aa',
                            500: '#71717a', 600: '#52525b', 700: '#3f3f46', 800: '#27272a', 900: '#18181b', 950: '#09090b',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b;
            color: #fafafa;
            margin: 0;
            overflow: hidden;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        .progress-bar-bg {
            width: 100%;
            height: 2px;
            background: #27272a;
            overflow: hidden;
            margin-top: 1rem;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: #fafafa;
            transition: width 0.3s ease-out;
        }
        .loader-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }

        .scrollable-panel::-webkit-scrollbar { width: 4px; }
        .scrollable-panel::-webkit-scrollbar-track { background: transparent; }
        .scrollable-panel::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }

        #three-container { cursor: grab; }
        #three-container:active { cursor: grabbing; }
    </style>
</head>
<body class="h-screen w-screen relative flex flex-col md:flex-row text-zinc-100">

    <div id="loading-overlay" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-zinc-950 transition-opacity duration-1000">
        <div class="w-72">
            <h1 class="text-2xl font-bold tracking-tight mb-2 text-center text-zinc-100">MediaPipe BlazePose Visualization</h1>
            <div class="text-center text-[10px] font-mono text-zinc-500 uppercase tracking-widest mb-6">Interactive Explainer</div>
            <div class="flex justify-between text-[10px] font-mono tracking-widest text-zinc-500 mb-1">
                <span id="loading-text" class="loader-pulse">Loading Model...</span>
                <span><span id="progress-percentage">0</span>%</span>
            </div>
            <div class="progress-bar-bg"><div id="progress-fill" class="progress-bar-fill"></div></div>
        </div>
    </div>

    <div id="left-panel" class="w-full md:w-[400px] lg:w-[450px] h-1/2 md:h-full bg-zinc-950/80 backdrop-blur-xl border-b md:border-b-0 md:border-r border-zinc-800/50 flex flex-col z-20 relative transform -translate-x-full opacity-0">
        
        <div class="p-8 pb-4 border-b border-zinc-800/50">
            <h2 class="text-2xl font-bold tracking-tight">MediaPipe BlazePose</h2>
            <div class="flex items-center gap-4 mt-2 text-[10px] font-mono text-zinc-500 tracking-widest">
                <div class="flex items-center gap-1">
                    <div class="w-1.5 h-1.5 rounded-full bg-zinc-300 animate-pulse"></div>
                    Tracking Active
                </div>
                <div>FPS: <span id="fps-counter" class="text-zinc-300">00</span></div>
            </div>
        </div>

        <div class="p-8 flex-1 overflow-y-auto scrollable-panel flex flex-col">
            <div class="uppercase text-[10px] tracking-widest text-zinc-500 mb-2 font-mono" id="stage-indicator">STAGE 01</div>
            <h3 class="text-3xl font-semibold mb-4 text-zinc-100" id="stage-title">Video Ingestion</h3>
            <p class="text-sm text-zinc-400 leading-relaxed mb-6" id="stage-desc">
                Raw RGB frames are streamed into the tensor pipeline.
            </p>
            
            <div id="stage-diagram-container" class="mt-2 mb-6 rounded-xl overflow-hidden border border-zinc-800/50 bg-zinc-900 hidden transition-all duration-500">
            </div>
        </div>

        <div class="p-6 border-t border-zinc-800/50 flex items-center justify-between bg-zinc-950/50">
            <button id="btn-prev" class="w-24 rounded-md text-xs font-medium border border-zinc-800 hover:bg-zinc-800 text-zinc-300 h-10 transition-colors disabled:opacity-30 disabled:cursor-not-allowed" disabled>
                Previous
            </button>
            <div class="flex gap-1.5" id="stage-indicators">
            </div>
            <button id="btn-next" class="w-28 rounded-md text-xs font-medium bg-zinc-100 text-zinc-900 hover:bg-white h-10 transition-colors shadow-[0_0_15px_rgba(255,255,255,0.1)]">
                Next Stage
            </button>
        </div>
    </div>

    <div id="right-panel" class="flex-1 h-1/2 md:h-full relative bg-zinc-950 overflow-hidden opacity-0">
        
        <div id="three-container" class="absolute inset-0"></div>
        
        <div id="video-pip" class="absolute top-6 right-6 w-32 md:w-48 aspect-[9/16] rounded-lg overflow-hidden border border-zinc-800 shadow-2xl transition-all duration-1000 opacity-0 transform translate-y-4">
            <div class="absolute top-2 left-2 bg-black/60 backdrop-blur px-2 py-0.5 rounded text-[9px] font-mono text-zinc-300 z-10 uppercase tracking-widest border border-white/10">Input Stream</div>
            <video id="input_video" 
                   src="https://res.cloudinary.com/doqeivclj/video/upload/v1778914470/ecstatic_dance_wgs4b2.mp4" 
                   crossorigin="anonymous" playsinline loop muted autoplay
                   class="w-full h-full object-cover grayscale transition-all duration-1000">
            </video>
        </div>
        
        <div class="absolute bottom-6 right-6 text-[10px] font-mono text-zinc-400 tracking-widest pointer-events-none flex flex-col items-end gap-1 opacity-80">
            <span>DRAG TO ROTATE</span>
            <span>SCROLL TO ZOOM</span>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const stagesData = [
            { },
            { 
                title: "Two-Step Pipeline", 
                desc: "BlazePose uses a two-step detector-tracker ML pipeline. First, an ultrafast detector locates the pose region-of-interest (ROI) within the frame. Then, the tracker predicts the landmarks within that specific region. This is much faster than scanning the whole image constantly.",
                diagramHtml: `<div class="flex flex-col gap-2 p-4 text-[10px] font-mono text-zinc-400 uppercase tracking-wider">
                    <div class="p-2 border border-zinc-800 rounded-md bg-zinc-900/50 text-center shadow-inner">1. Raw Video Frame</div>
                    <div class="w-px h-4 bg-zinc-700 mx-auto"></div>
                    <div class="p-2 border border-zinc-700 rounded-md bg-zinc-800/50 text-center text-zinc-300">2. Face/Torso Detector (ROI)</div>
                    <div class="w-px h-4 bg-zinc-700 mx-auto"></div>
                    <div class="p-2 border border-zinc-600 rounded-md bg-zinc-800 text-center text-zinc-200 shadow-[0_0_10px_rgba(255,255,255,0.05)]">3. 3D Landmark Tracker</div>
                </div>`,
                camZ: 250, camY: 100, pipOpacity: 1, pipGrayscale: 0, skeletonOpacity: 0.1, particleSpeed: 0.001
            },
            { 
                title: "33-Landmark Topology", 
                desc: "Inside the bounding box, the network predicts X, Y, and Z coordinates for 33 distinct anatomical joints. Unlike older models, BlazePose predicts true depth (Z-axis). The topology uniquely includes face, hands, and feet keypoints for highly expressive body language tracking.",
                diagramHtml: `<div class="flex items-center justify-center p-6 opacity-80">
                    <div class="relative w-24 h-32 border border-zinc-800 rounded-lg bg-zinc-950/50 shadow-inner">
                        <div class="absolute top-2 left-1/2 -translate-x-1/2 w-3 h-3 rounded-full bg-zinc-300 shadow-[0_0_8px_rgba(255,255,255,0.5)]"></div>
                        <div class="absolute top-8 left-1/4 w-2 h-2 rounded-full bg-zinc-500"></div>
                        <div class="absolute top-8 right-1/4 w-2 h-2 rounded-full bg-zinc-500"></div>
                        <div class="absolute top-16 left-1/2 -translate-x-1/2 w-2 h-2 rounded-full bg-zinc-500"></div>
                        <div class="absolute bottom-4 left-1/3 w-2 h-2 rounded-full bg-zinc-600"></div>
                        <div class="absolute bottom-4 right-1/3 w-2 h-2 rounded-full bg-zinc-600"></div>
                        <svg class="absolute inset-0 w-full h-full text-zinc-700" style="z-index:-1"><path d="M48 14 L24 36 M48 14 L72 36 M48 14 L48 64 M48 64 L32 112 M48 64 L64 112" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                    </div>
                </div>`,
                camZ: 180, camY: 100, pipOpacity: 0.8, pipGrayscale: 0.5, skeletonOpacity: 0.4, particleSpeed: 0.003
            },
            { 
                title: "Kinematic Structure", 
                desc: "By drawing edges between specific nodes, we infer a structured, kinetic skeleton. The model calculates a 'visibility' score for each node, using temporal consistency to predict limb locations even when they are occluded behind the body.",
                diagramHtml: null,
                camZ: 200, camY: 120, pipOpacity: 0.4, pipGrayscale: 1, skeletonOpacity: 0.8, particleSpeed: 0.001
            },
            { 
                title: "Pure Spatial Extraction", 
                desc: "Visual context is stripped completely, leaving an array of pure 3D coordinates. The camera dynamically orbits the spatial data. This lightweight output is ready for real-time avatar retargeting, sports physics analysis, or immersive VR interactions.",
                diagramHtml: null,
                camZ: 220, camY: 80, pipOpacity: 0, pipGrayscale: 1, skeletonOpacity: 1, particleSpeed: 0.0005
            },
            { 
                title: "Try It Yourself", 
                desc: "Upload your own video and see BlazePose in action on custom footage. The model will re-initialize and process your movements in real-time.",
                diagramHtml: `<div class="flex flex-col gap-4 p-6 rounded-xl bg-gradient-to-b from-zinc-900/40 to-zinc-950/60 border border-zinc-800/40 text-center shadow-[inset_0_0_0_1px_rgba(255,255,255,0.02)]">
                    <p class="text-xs text-zinc-500">Supported formats: MP4, WebM</p>
                    <label class="cursor-pointer bg-zinc-200/10 text-zinc-200 hover:bg-zinc-200/20 px-4 py-2 rounded-md font-medium text-sm transition-colors inline-block mx-auto border border-zinc-700/60">
                        <input type="file" id="custom-video-upload" accept="video/mp4,video/webm" class="hidden">
                        Upload Video
                    </label>
                </div>`,
                camZ: 220, camY: 80, pipOpacity: 1, pipGrayscale: 0, skeletonOpacity: 1, particleSpeed: 0.001
            }
        ];

        const videoElement = document.getElementById('input_video');
        const loadingOverlay = document.getElementById('loading-overlay');
        const leftPanel = document.getElementById('left-panel');
        const rightPanel = document.getElementById('right-panel');
        const videoPip = document.getElementById('video-pip');
        
        const uiTitle = document.getElementById('stage-title');
        const uiDesc = document.getElementById('stage-desc');
        const uiDiagramContainer = document.getElementById('stage-diagram-container');
        const uiIndicator = document.getElementById('stage-indicator');
        const btnNext = document.getElementById('btn-next');
        const btnPrev = document.getElementById('btn-prev');
        const indicatorsContainer = document.getElementById('stage-indicators');
        const fpsCounter = document.getElementById('fps-counter');

        let currentStage = 1;
        const totalStages = 5;
        let isModelReady = false;
        let isSequenceStarted = false;
        let lastFrameTime = performance.now();

        for(let i=1; i<=totalStages; i++) {
            const dot = document.createElement('div');
            dot.className = `w-2 h-2 rounded-full transition-all duration-300 ${i === 1 ? 'bg-zinc-200 scale-125' : 'bg-zinc-700'}`;
            dot.id = `dot-${i}`;
            indicatorsContainer.appendChild(dot);
        }

        const container = document.getElementById('three-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x09090b, 0.002);

        const camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 1, 1000);
        camera.position.set(0, 100, 250);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 2.0;
        controls.enablePan = false;
        controls.enableZoom = true;
        controls.maxPolarAngle = Math.PI / 2 - 0.05;
        controls.target.set(0, 100, 0);

        const particleGroup = new THREE.Group();
        scene.add(particleGroup);

        const pCount = 250;
        const pGeo = new THREE.BufferGeometry();
        const pPos = new Float32Array(pCount * 3);
        const pColors = new Float32Array(pCount * 3);
        const pData = [];
        
        const colorLight = new THREE.Color(0xd4d4d8);
        const colorMid = new THREE.Color(0x71717a);
        const colorDark = new THREE.Color(0x3f3f46);

        for (let i = 0; i < pCount; i++) {
            const theta = Math.random() * Math.PI * 2;
            const y = (Math.random() - 0.5) * 600;
            const radius = 80 + Math.random() * 250;
            
            pPos[i*3] = Math.cos(theta) * radius;
            pPos[i*3+1] = y;
            pPos[i*3+2] = Math.sin(theta) * radius;
            
            const randColor = Math.random();
            let c = colorDark;
            if(randColor > 0.90) c = colorLight;
            else if(randColor > 0.60) c = colorMid;
            
            pColors[i*3] = c.r;
            pColors[i*3+1] = c.g;
            pColors[i*3+2] = c.b;

            pData.push({ 
                theta: theta,
                radius: radius,
                speed: (Math.random() - 0.5) * 2.0,
                floatSpeed: (Math.random() - 0.5) * 1.5
            });
        }
        pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
        pGeo.setAttribute('color', new THREE.BufferAttribute(pColors, 3));
        
        const pMat = new THREE.PointsMaterial({ 
            size: 2.5, 
            vertexColors: true, 
            transparent: true, 
            opacity: 0.8,
            blending: THREE.AdditiveBlending 
        });
        const particles = new THREE.Points(pGeo, pMat);
        particleGroup.add(particles);

        const lGeo = new THREE.BufferGeometry();
        lGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(pCount * pCount * 3), 3).setUsage(THREE.DynamicDrawUsage));
        const lMat = new THREE.LineBasicMaterial({ 
            color: 0x52525b, 
            transparent: true, 
            opacity: 0.15,
            blending: THREE.AdditiveBlending 
        });
        const linesMesh = new THREE.LineSegments(lGeo, lMat);
        particleGroup.add(linesMesh);

        const skeletonGroup = new THREE.Group();
        scene.add(skeletonGroup);
        const SKELETON_SCALE = 100; 

        const jointGeo = new THREE.SphereGeometry(1.5, 16, 16);
        const jointMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 });
        const joints = [];
        for(let i=0; i<33; i++) {
            const mesh = new THREE.Mesh(jointGeo, jointMat);
            skeletonGroup.add(mesh);
            joints.push(mesh);
        }

        const POSE_CONNECTIONS = [
            [15, 21], [16, 22], [15, 17], [16, 18], [15, 19], [16, 20], [17, 19], [18, 20],
            [11, 13], [13, 15], [12, 14], [14, 16], [11, 12], [11, 23], [12, 24], [23, 24],
            [23, 25], [24, 26], [25, 27], [26, 28], [27, 29], [28, 30], [29, 31], [30, 32],
            [27, 31], [28, 32], [0, 1], [1, 2], [2, 3], [3, 7], [0, 4], [4, 5], [5, 6],
            [6, 8], [9, 10]
        ];
        
        const boneMat = new THREE.LineBasicMaterial({ color: 0xa1a1aa, transparent: true, opacity: 0, linewidth: 2 });
        const bones = [];
        POSE_CONNECTIONS.forEach(() => {
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6), 3));
            const line = new THREE.Line(geo, boneMat);
            skeletonGroup.add(line);
            bones.push(line);
        });

        skeletonGroup.position.y = 0;

        const gridHelper = new THREE.GridHelper(400, 20, 0x3f3f46, 0x27272a);
        gridHelper.position.y = 0;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.5;
        scene.add(gridHelper);

        let globalParticleSpeed = 0.001;

        function animateThree() {
            requestAnimationFrame(animateThree);
            controls.update();

            let vertexpos = 0;
            let numConnected = 0;
            const positions = particles.geometry.attributes.position.array;
            const linePositions = linesMesh.geometry.attributes.position.array;

            const speedMultiplier = globalParticleSpeed * 1500;

            for(let i=0; i<pCount; i++) {
                pData[i].theta += pData[i].speed * speedMultiplier * 0.01;
                positions[i*3] = Math.cos(pData[i].theta) * pData[i].radius;
                
                positions[i*3+1] += pData[i].floatSpeed * speedMultiplier;
                
                if(positions[i*3+1] > 300) positions[i*3+1] = -300;
                if(positions[i*3+1] < -300) positions[i*3+1] = 300;

                positions[i*3+2] = Math.sin(pData[i].theta) * pData[i].radius;

                for(let j=i+1; j<pCount; j++) {
                    const dx = positions[i*3] - positions[j*3];
                    const dy = positions[i*3+1] - positions[j*3+1];
                    const dz = positions[i*3+2] - positions[j*3+2];
                    const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);

                    if(dist < 55) {
                        linePositions[vertexpos++] = positions[i*3];
                        linePositions[vertexpos++] = positions[i*3+1];
                        linePositions[vertexpos++] = positions[i*3+2];
                        linePositions[vertexpos++] = positions[j*3];
                        linePositions[vertexpos++] = positions[j*3+1];
                        linePositions[vertexpos++] = positions[j*3+2];
                        numConnected++;
                    }
                }
            }
            linesMesh.geometry.setDrawRange(0, numConnected * 2);
            linesMesh.geometry.attributes.position.needsUpdate = true;
            particles.geometry.attributes.position.needsUpdate = true;

            renderer.render(scene, camera);
        }
        animateThree();

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        const pose = new Pose({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
        }});

        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            enableSegmentation: false,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        pose.onResults((results) => {
            const now = performance.now();
            fpsCounter.innerText = Math.round(1000 / (now - lastFrameTime));
            lastFrameTime = now;

            if (!isModelReady) {
                isModelReady = true;
                clearInterval(fakeProgress);
                document.getElementById('progress-percentage').innerText = "100";
                document.getElementById('progress-fill').style.width = "100%";
                document.getElementById('loading-text').innerText = "Starting...";
                document.getElementById('loading-text').classList.remove('loader-pulse');
                document.getElementById('loading-text').classList.add('text-zinc-300');
                
                setTimeout(() => {
                    startApplication();
                }, 800);
            }

            if (results.poseWorldLandmarks && isSequenceStarted) {
                const lm = results.poseWorldLandmarks;
                
                // Anchor to hips/feet to keep the grid stable and avoid visible drift.
                const hipX = (lm[23].x + lm[24].x) / 2 * SKELETON_SCALE;
                const hipZ = (lm[23].z + lm[24].z) / 2 * SKELETON_SCALE;
                
                const lowestY = Math.min(-lm[27].y, -lm[28].y, -lm[31].y, -lm[32].y) * SKELETON_SCALE;
                
                const targetY = -lowestY;
                
                skeletonGroup.position.x += (-hipX - skeletonGroup.position.x) * 0.15;
                skeletonGroup.position.z += (-hipZ - skeletonGroup.position.z) * 0.15;
                skeletonGroup.position.y += (targetY - skeletonGroup.position.y) * 0.15;

                for(let i=0; i<33; i++) {
                    joints[i].position.set(lm[i].x * SKELETON_SCALE, -lm[i].y * SKELETON_SCALE, -lm[i].z * SKELETON_SCALE);
                    
                    joints[i].visible = lm[i].visibility > 0.5;
                }

                POSE_CONNECTIONS.forEach((conn, idx) => {
                    const startIdx = conn[0];
                    const endIdx = conn[1];
                    const startNode = lm[startIdx];
                    const endNode = lm[endIdx];

                    if (startNode.visibility > 0.5 && endNode.visibility > 0.5) {
                        bones[idx].visible = true;
                        const pos = bones[idx].geometry.attributes.position.array;
                        
                        pos[0] = startNode.x * SKELETON_SCALE; 
                        pos[1] = -startNode.y * SKELETON_SCALE; 
                        pos[2] = -startNode.z * SKELETON_SCALE;
                        
                        pos[3] = endNode.x * SKELETON_SCALE; 
                        pos[4] = -endNode.y * SKELETON_SCALE; 
                        pos[5] = -endNode.z * SKELETON_SCALE;
                        
                        bones[idx].geometry.attributes.position.needsUpdate = true;
                    } else {
                        bones[idx].visible = false;
                    }
                });
            }
        });

        async function processVideoLoop() {
            if (isSequenceStarted && !videoElement.paused && !videoElement.ended) {
                try {
                    await pose.send({image: videoElement});
                } catch(e) {
                    // Swallow transient failures while swapping video sources.
                }
            }
            if (isSequenceStarted) {
                requestAnimationFrame(processVideoLoop);
            }
        }

        let progressVal = 0;
        const fakeProgress = setInterval(() => {
            if(progressVal < 90) {
                progressVal += Math.random() * 5;
                document.getElementById('progress-percentage').innerText = Math.floor(progressVal);
                document.getElementById('progress-fill').style.width = `${progressVal}%`;
            }
        }, 300);

        videoElement.addEventListener('loadeddata', async () => {
            try {
                await pose.send({image: videoElement});
            } catch (err) {}
        }, {once: true});

        function startApplication() {
            isSequenceStarted = true;
            
            videoElement.muted = true;
            const playPromise = videoElement.play();
            
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    processVideoLoop();
                }).catch((error) => {
                    console.warn("Autoplay blocked. Waiting for first user interaction...", error);
                    // Start on first interaction to satisfy autoplay restrictions.
                    const startOnInteraction = () => {
                        videoElement.play();
                        processVideoLoop();
                        window.removeEventListener('click', startOnInteraction);
                        window.removeEventListener('touchstart', startOnInteraction);
                    };
                    window.addEventListener('click', startOnInteraction);
                    window.addEventListener('touchstart', startOnInteraction);
                });
            } else {
                processVideoLoop();
            }

            gsap.to(loadingOverlay, { opacity: 0, duration: 1, onComplete: () => loadingOverlay.style.display = 'none' });
            
            gsap.to(leftPanel, { x: 0, opacity: 1, duration: 1, ease: "power3.out", delay: 0.2 });
            gsap.to(rightPanel, { opacity: 1, duration: 1, delay: 0.2 });
            gsap.to(videoPip, { opacity: 1, y: 0, duration: 1, ease: "back.out(1.5)", delay: 0.8 });

            applyStage(1);
        }

        uiDiagramContainer.addEventListener('change', (e) => {
            if (e.target && e.target.id === 'custom-video-upload') {
                const file = e.target.files[0];
                if (!file) return;

                const url = URL.createObjectURL(file);
                
                // Stop the loop while swapping sources to avoid pose runtime errors.
                isSequenceStarted = false;
                videoElement.pause();
                
                videoElement.src = url;
                videoElement.load();

                videoElement.addEventListener('loadeddata', async () => {
                    try {
                        await videoElement.play();
                        isSequenceStarted = true;
                        processVideoLoop();
                    } catch(err) {
                        console.warn("Error playing uploaded video", err);
                    }
                }, { once: true });
            }
        });

        function applyStage(stageNum) {
            const data = stagesData[stageNum];
            
            const tl = gsap.timeline();
            tl.to([uiTitle, uiDesc, uiDiagramContainer], { opacity: 0, x: -10, duration: 0.2, stagger: 0.05 })
              .call(() => {
                  uiIndicator.innerText = `STAGE 0${stageNum}`;
                  uiTitle.innerText = data.title;
                  uiDesc.innerText = data.desc;
                  
                  if (data.diagramHtml) {
                      uiDiagramContainer.innerHTML = data.diagramHtml;
                      uiDiagramContainer.classList.remove('hidden');
                  } else {
                      uiDiagramContainer.classList.add('hidden');
                      uiDiagramContainer.innerHTML = '';
                  }
                  
                  if(stageNum === totalStages) btnNext.innerText = "Start Over";
                  else btnNext.innerText = "Next Stage";

                  btnPrev.disabled = stageNum === 1;

                  for(let i=1; i<=totalStages; i++) {
                      const dot = document.getElementById(`dot-${i}`);
                      if(i === stageNum) {
                          dot.classList.replace('bg-zinc-700', 'bg-zinc-200');
                          dot.classList.add('scale-125');
                      } else {
                          dot.classList.replace('bg-zinc-200', 'bg-zinc-700');
                          dot.classList.remove('scale-125');
                      }
                  }
              })
              .to([uiTitle, uiDesc, uiDiagramContainer], { opacity: 1, x: 0, duration: 0.4, stagger: 0.1, ease: "power2.out" });

            gsap.to(videoPip, { opacity: data.pipOpacity, duration: 1, ease: "power2.inOut" });
            gsap.to(videoElement, { filter: `grayscale(${data.pipGrayscale * 100}%)`, duration: 1 });
            
            gsap.to(camera.position, { z: data.camZ, y: data.camY, duration: 2, ease: "power3.inOut" });
            
            gsap.to(jointMat, { opacity: data.skeletonOpacity, duration: 1 });
            gsap.to(boneMat, { opacity: data.skeletonOpacity, duration: 1 });

            globalParticleSpeed = data.particleSpeed;
            gsap.to(pMat, { opacity: stageNum >= 4 ? 0.1 : 0.4, duration: 1 });

            currentStage = stageNum;
        }

        btnNext.addEventListener('click', () => {
            if (currentStage < totalStages) applyStage(currentStage + 1);
            else applyStage(1);
        });

        btnPrev.addEventListener('click', () => {
            if (currentStage > 1) applyStage(currentStage - 1);
        });

        videoElement.load();
    </script>
</body>
</html>
